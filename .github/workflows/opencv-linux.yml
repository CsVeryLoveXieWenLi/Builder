# Opencv Linux

name: opencv-linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: true

env:
  OPENCV_VERSION: ${{ github.event.inputs.version }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 安装Cmake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: "latest"

    - name: 测试CMake
      run: cmake --version

    - name: 检出Opencv源代码
      uses: actions/checkout@v4
      with:
        repository: opencv/opencv
        ref: ${{ env.OPENCV_VERSION }}

    - name: 创建Cmake临时文件夹
      run: mkdir build

    - name: 修复Openjpeg库
      run: sed -i 's/define OPJ_API    __attribute__ ((visibility ("hidden")))/define OPJ_API    __attribute__ ((visibility ("default")))/g' 3rdparty/openjpeg/openjp2/openjpeg.h

    - name: 测试
      run: cat 3rdparty/openjpeg/openjp2/openjpeg.h