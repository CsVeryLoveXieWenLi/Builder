name: Build Crypto++ 8.9.0 Multi-Arch

on:
  workflow_dispatch: # 在 Actions 页面手动点击运行

jobs:
  build:
    name: ${{ matrix.compiler }} - ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        # 定义编译器和架构的组合
        compiler: [msvc, mingw]
        arch: [x86, x64]

    steps:
      - name: Checkout Crypto++
        uses: actions/checkout@v4
        with:
          repository: weidai11/cryptopp
          ref: CRYPTOPP_8_9_0

      # --- 环境准备：MSVC ---
      - name: Setup MSBuild
        if: matrix.compiler == 'msvc'
        uses: microsoft/setup-msbuild@v2

      # --- 环境准备：MinGW ---
      - name: Setup MinGW
        if: matrix.compiler == 'mingw'
        uses: egor-tensin/setup-gcc@v1
        with:
          args: ${{ matrix.arch == 'x86' && '-m32' || '-m64' }}

      # --- 执行编译：MSVC ---
      - name: Build MSVC
        if: matrix.compiler == 'msvc'
        run: |
          # 映射架构名称：MSBuild 使用 Win32 代表 x86
          $msvc_arch = if ("${{ matrix.arch }}" -eq "x86") { "Win32" } else { "x64" }
          msbuild cryptest.sln /t:Rebuild /p:Configuration=Release /p:Platform=$msvc_arch /m

      # --- 执行编译：MinGW ---
      - name: Build MinGW
        if: matrix.compiler == 'mingw'
        shell: bash
        run: |
          # 根据架构设置编译标志
          export CXXFLAGS="${{ matrix.arch == 'x86' && '-m32' || '-m64' }} -O3"
          # 使用 GNUmakefile 编译
          make -f GNUmakefile -j4
          # 重命名以防混淆
          mv cryptest.exe cryptest_${{ matrix.arch }}_mingw.exe

      # --- 整理产物 ---
      - name: Organize Artifacts
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.compiler }}" == "msvc" ]; then
            # MSVC 的路径通常在 Win32/Output 或 x64/Output
            PLAT_DIR="${{ matrix.arch == 'x86' && 'Win32' || 'x64' }}"
            cp "$PLAT_DIR/Output/Release/cryptest.exe" "dist/cryptest_msvc_${{ matrix.arch }}.exe" || true
            cp "cryptlib.lib" "dist/cryptopp_msvc_${{ matrix.arch }}.lib" || true
          else
            cp cryptest_${{ matrix.arch }}_mingw.exe dist/
            cp libcryptopp.a "dist/libcryptopp_mingw_${{ matrix.arch }}.a" || true
          fi

      - name: Upload to Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cryptopp-${{ matrix.compiler }}-${{ matrix.arch }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v8.9.0-release
          name: Crypto++ 8.9.0 (MSVC & MinGW)
          body: |
            自动编译完成。
            - 包含 MSVC (x86/x64) 静态库与测试程序
            - 包含 MinGW (x86/x64) 静态库与测试程序
          files: all-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
