name: Opencv

on:
  workflow_dispatch:
   inputs:

      version:
        description: '源码版本'
        required: true
        default: '4.8.0'

      library:
        description: '是否编译动态库'
        required: true
        default: 'OFF'

env:
   DOWNLOAD_URL: https://github.com/opencv/opencv/archive/refs/tags/${INPUT_VERSION}.zip

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: "准备工作"
        run: apt update && apt upgrade && apt install unzip -y && apt install cmake -y
