name: 编译-Opencv-Win32

on:
    workflow_dispatch:
        inputs:

            version:
                description: '源码版本 (Search)'
                required: true
                default: '4.8.1'

            build:
                description: '发布版本 (Release Debug MinSizeRel RelWithDebInfo)'
                required: true
                default: 'Release'

            library:
                description: '是否编译动态库 (OFF ON)'
                required: true
                default: 'OFF'

            cpu:
                description: '生成架构 (x64 || win32)'
                required: true
                default: 'x64'

env:

    CONFIG_VERSION: ${{ github.event.inputs.version }}
    CONFIG_LIBRARY: ${{ github.event.inputs.library }}
    CONFIG_BUILD: ${{ github.event.inputs.build }}
    CONFIG_CPU: ${{ github.event.inputs.cpu }}

    OPENCV_CODE_URL: https://github.com/opencv/opencv/archive/refs/tags/${{ github.event.inputs.version }}.zip

    OPENCV_DIR_NAME: opencv-${{ github.event.inputs.version }}

jobs:

    build:
        runs-on: windows-2019

        steps:
            - name: '安装环境 Cmake'
              uses: jwlawson/actions-setup-cmake@v1.14.2
            
            - name: '下载源码'
              run: |
                  Invoke-RestMethod -Uri $Env:OPENCV_CODE_URL -OutFile code.zip

            - name: '解压源码'
              run: |
                  Expand-Archive -LiteralPath code.zip -DestinationPath temp -PassThru
                  rm code.zip

            - name: '创建目录'
              run: |
                  cd temp
                  mkdir $Env:OPENCV_DIR_NAME\build
                  mkdir install

            - name: '配置项目'
              run: |
                  cd temp
                  cd $Env:OPENCV_DIR_NAME
                  cd build
                  cmake ..

            - name: '编译，启动！'
              run: |
                  cd temp
                  cd $Env:OPENCV_DIR_NAME
                  cd build
                  msbuild ALL_BUILD.vcxproj /maxcpucount:2

            - name: '编译，完成！'
              uses: actions/upload-artifact@v4.0.0
              with:
                  name: 编译-Opencv-Win32
                  path: ${{ github.workspace }}/temp/install
